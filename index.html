<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Nano Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface-2: #25252d;
      --border: #2e2e38;
      --accent: #6c63ff;
      --accent-dim: #3d3878;
      --user-bubble: #2563eb;
      --model-bubble: #1e1e28;
      --text: #e8e8f0;
      --text-dim: #7f7f9a;
      --radius: 16px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 760px;
      padding: 18px 24px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, #6c63ff, #06b6d4, #6c63ff);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    header p {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 1px;
    }

    #status-dot {
      margin-left: auto;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.ready   { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    #status-dot.loading { background: #f59e0b; box-shadow: 0 0 6px #f59e0b88; }
    #status-dot.error   { background: #ef4444; box-shadow: 0 0 6px #ef444488; }

    /* ── Banner ── */
    #banner {
      width: 100%;
      max-width: 760px;
      padding: 8px 24px;
      font-size: 0.78rem;
      text-align: center;
      color: var(--text-dim);
      display: none;
    }
    #banner.visible { display: block; }
    #banner.error   { color: #f87171; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      width: 100%;
      max-width: 760px;
      overflow-y: auto;
      padding: 24px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: fadeSlide 0.2s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .msg.user  .avatar { background: var(--user-bubble); color: #fff; }
    .msg.model .avatar { background: conic-gradient(from 180deg, #6c63ff, #06b6d4, #6c63ff); color: #fff; }

    .bubble {
      max-width: 75%;
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user  .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-top-right-radius: var(--radius-sm);
    }
    .msg.model .bubble {
      background: var(--model-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: var(--radius-sm);
    }

    /* typing indicator */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0 2px;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input bar ── */
    #input-bar {
      width: 100%;
      max-width: 760px;
      padding: 12px 20px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input-wrap {
      flex: 1;
      display: flex;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    #input-wrap:focus-within { border-color: var(--accent); }

    #prompt {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font: inherit;
      font-size: 0.92rem;
      line-height: 1.5;
      max-height: 160px;
      overflow-y: auto;
    }
    #prompt::placeholder { color: var(--text-dim); }

    #send-btn {
      width: 40px; height: 40px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }
    #send-btn:hover:not(:disabled) { background: #7c74ff; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; }

    /* ── Welcome screen ── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text-dim);
      text-align: center;
      padding: 24px;
    }
    #welcome .big-logo {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, #6c63ff, #06b6d4, #6c63ff);
      margin-bottom: 4px;
    }
    #welcome h2 { font-size: 1.4rem; color: var(--text); font-weight: 600; }
    #welcome p  { font-size: 0.88rem; max-width: 320px; line-height: 1.6; }
    #welcome .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .chip {
      padding: 7px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      font-size: 0.8rem;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .chip:hover { border-color: var(--accent); background: var(--accent-dim); }
  </style>
</head>
<body>

<header>
  <div class="logo"></div>
  <div>
    <h1>Gemini Nano</h1>
    <p>Built-in Chrome AI</p>
  </div>
  <span id="status-dot" title="Initializing…"></span>
</header>

<div id="banner"></div>

<!-- Welcome / empty state -->
<div id="welcome">
  <div class="big-logo"></div>
  <h2>What can I help with?</h2>
  <p>Powered by Gemini Nano running entirely in your browser — no data leaves your device.</p>
  <div class="chips">
    <span class="chip" data-prompt="Explain quantum entanglement simply">Explain quantum entanglement</span>
    <span class="chip" data-prompt="Write a haiku about the ocean">Write a haiku</span>
    <span class="chip" data-prompt="What are the SOLID principles in software engineering?">SOLID principles</span>
    <span class="chip" data-prompt="Give me 5 productivity tips">Productivity tips</span>
  </div>
</div>

<div id="messages" style="display:none"></div>

<div id="input-bar">
  <div id="input-wrap">
    <textarea id="prompt" rows="1" placeholder="Message Gemini Nano…" disabled></textarea>
  </div>
  <button id="send-btn" disabled title="Send">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
  const statusDot  = document.getElementById('status-dot');
  const banner     = document.getElementById('banner');
  const messagesEl = document.getElementById('messages');
  const welcome    = document.getElementById('welcome');
  const promptEl   = document.getElementById('prompt');
  const sendBtn    = document.getElementById('send-btn');

  let session = null;
  let responding = false;

  /* ── Utilities ── */
  function setStatus(state, msg) {
    statusDot.className = state;
    statusDot.title = msg;
  }

  function showBanner(msg, isError = false) {
    banner.textContent = msg;
    banner.className = 'visible' + (isError ? ' error' : '');
  }
  function hideBanner() { banner.className = ''; }

  function autoResize() {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px';
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showMessages() {
    welcome.style.display = 'none';
    messagesEl.style.display = 'flex';
  }

  /* ── Message rendering ── */
  function addMessage(role, text) {
    showMessages();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'You' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function addTypingIndicator() {
    showMessages();
    const wrap = document.createElement('div');
    wrap.className = 'msg model';
    wrap.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function removeTypingIndicator() {
    document.getElementById('typing')?.remove();
  }

  /* ── Session init ── */
  async function initSession() {
    setStatus('loading', 'Initializing Gemini Nano…');
    promptEl.placeholder = 'Initializing model…';

    try {
      if (typeof LanguageModel === 'undefined') {
        throw new Error('LanguageModel API not found. Make sure you are using Chrome ≥ 127 with the Prompt API flag enabled.');
      }

      session = await LanguageModel.create();

      setStatus('ready', 'Gemini Nano ready');
      hideBanner();
      promptEl.disabled = false;
      sendBtn.disabled  = false;
      promptEl.placeholder = 'Message Gemini Nano…';
      promptEl.focus();

    } catch (err) {
      setStatus('error', err.message);
      showBanner('⚠ ' + err.message, true);
      promptEl.placeholder = 'Model unavailable';
      console.error('[Gemini Nano]', err);
    }
  }

  /* ── Send message ── */
  async function sendMessage(text) {
    if (responding || !session || !text.trim()) return;

    responding = true;
    sendBtn.disabled = true;
    promptEl.disabled = true;

    addMessage('user', text.trim());

    const typingWrap = addTypingIndicator();

    try {
      // Use streaming when available for a snappier experience
      let reply = '';

      if (typeof session.promptStreaming === 'function') {
        const stream = session.promptStreaming(text.trim());
        removeTypingIndicator();
        const modelBubble = addMessage('model', '');
        let prevChunk = '';

        for await (const chunk of stream) {
          // The API may yield either accumulated text or deltas.
          // Handle both: if chunk starts with what we already have, slice off
          // the known prefix to get only the new characters; otherwise treat
          // the whole chunk as a delta.
          const delta = chunk.startsWith(prevChunk)
            ? chunk.slice(prevChunk.length)
            : chunk;
          prevChunk = chunk;
          reply += delta;
          modelBubble.textContent = reply;
          scrollToBottom();
        }

        if (!reply) modelBubble.textContent = '(no response)';

      } else {
        // Fallback: non-streaming
        reply = await session.prompt(text.trim());
        removeTypingIndicator();
        addMessage('model', reply || '(no response)');
      }

    } catch (err) {
      removeTypingIndicator();
      addMessage('model', '⚠ Error: ' + err.message);
      console.error('[Gemini Nano]', err);
    } finally {
      responding = false;
      sendBtn.disabled  = false;
      promptEl.disabled = false;
      promptEl.style.height = 'auto';
      promptEl.focus();
    }
  }

  /* ── Event listeners ── */
  sendBtn.addEventListener('click', () => {
    const text = promptEl.value;
    promptEl.value = '';
    autoResize();
    sendMessage(text);
  });

  promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = promptEl.value;
      promptEl.value = '';
      autoResize();
      sendMessage(text);
    }
  });

  promptEl.addEventListener('input', autoResize);

  // Suggestion chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const p = chip.dataset.prompt;
      if (session && !responding) sendMessage(p);
    });
  });

  /* ── Boot ── */
  initSession();
</script>
</body>
</html>
